name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_USER }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "One or more required GitHub secrets are missing: EC2_HOST, EC2_USER, EC2_SSH_KEY"
            exit 1
          fi

      - name: Validate app secrets
        run: |
          if [ -z "${{ secrets.MONGODB_URI }}" ] || [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "One or more required app secrets are missing: MONGODB_URI, JWT_SECRET"
            exit 1
          fi

          case "${{ secrets.MONGODB_URI }}" in
            mongodb://*|mongodb+srv://*) ;;
            *)
              echo "MONGODB_URI must start with mongodb:// or mongodb+srv://"
              exit 1
              ;;
          esac

      - name: Generate runtime .env
        env:
          PORT: "5000"
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OCR_PROVIDER: ${{ secrets.OCR_PROVIDER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MINDEE_API_KEY_V1: ${{ secrets.MINDEE_API_KEY_V1 }}
          MINDEE_API_KEY: ${{ secrets.MINDEE_API_KEY }}
          ADMIN_FIRST_NAME: ${{ secrets.ADMIN_FIRST_NAME }}
          ADMIN_LAST_NAME: ${{ secrets.ADMIN_LAST_NAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          def format_value(value: str) -> str:
              value = "" if value is None else str(value)
              if value == "":
                  return '""'
              if any(char in value for char in ' #"\n\r\t='):
                  escaped = (
                      value.replace('\\', '\\\\')
                      .replace('"', '\\"')
                      .replace('\r', '')
                      .replace('\n', '\\n')
                  )
                  return f'"{escaped}"'
              return value

          entries = [
              ("PORT", os.getenv("PORT", "5000")),
              ("MONGODB_URI", os.getenv("MONGODB_URI", "")),
              ("JWT_SECRET", os.getenv("JWT_SECRET", "")),
              ("OCR_PROVIDER", os.getenv("OCR_PROVIDER", "textract")),
              ("AWS_REGION", os.getenv("AWS_REGION", "")),
              ("AWS_DEFAULT_REGION", os.getenv("AWS_DEFAULT_REGION", "")),
              ("AWS_ACCESS_KEY_ID", os.getenv("AWS_ACCESS_KEY_ID", "")),
              ("AWS_SECRET_ACCESS_KEY", os.getenv("AWS_SECRET_ACCESS_KEY", "")),
              ("AWS_SESSION_TOKEN", os.getenv("AWS_SESSION_TOKEN", "")),
              ("FRONTEND_URL", os.getenv("FRONTEND_URL", "http://localhost:3000")),
              ("CLOUDINARY_CLOUD_NAME", os.getenv("CLOUDINARY_CLOUD_NAME", "")),
              ("CLOUDINARY_API_KEY", os.getenv("CLOUDINARY_API_KEY", "")),
              ("CLOUDINARY_API_SECRET", os.getenv("CLOUDINARY_API_SECRET", "")),
              ("SMTP_HOST", os.getenv("SMTP_HOST", "")),
              ("SMTP_PORT", os.getenv("SMTP_PORT", "465")),
              ("SMTP_USER", os.getenv("SMTP_USER", "")),
              ("SMTP_PASS", os.getenv("SMTP_PASS", "")),
              ("SENDGRID_API_KEY", os.getenv("SENDGRID_API_KEY", "")),
              ("MINDEE_API_KEY_V1", os.getenv("MINDEE_API_KEY_V1", "")),
              ("MINDEE_API_KEY", os.getenv("MINDEE_API_KEY", "")),
              ("ADMIN_FIRST_NAME", os.getenv("ADMIN_FIRST_NAME", "ERP")),
              ("ADMIN_LAST_NAME", os.getenv("ADMIN_LAST_NAME", "Admin")),
              ("ADMIN_EMAIL", os.getenv("ADMIN_EMAIL", "admin@erp.local")),
              ("ADMIN_PASSWORD", os.getenv("ADMIN_PASSWORD", "admin123")),
          ]

          content = "\n".join(f"{key}={format_value(value)}" for key, value in entries) + "\n"
          Path(".env").write_text(content, encoding="utf-8")
          PY

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%b' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "EC2_SSH_KEY is not a valid unencrypted private key. Make sure you pasted the full private key, not the public key, and that it is not passphrase-protected."
            exit 1
          fi
          SSH_PORT="${{ secrets.EC2_PORT }}"
          if [ -z "$SSH_PORT" ]; then
            SSH_PORT=22
          fi
          echo "$SSH_PORT" > ~/.ssh/ec2_port

      - name: Deploy on EC2
        run: |
          SSH_PORT=$(cat ~/.ssh/ec2_port)
          if ! nc -z -w 5 "${{ secrets.EC2_HOST }}" "$SSH_PORT"; then
            echo "Unable to reach EC2 on port $SSH_PORT. Check the instance public address, security group inbound rules, and whether SSH is listening on a custom port."
            exit 1
          fi

          tar --exclude=.git --exclude=node_modules -czf /tmp/backend-deploy.tar.gz -C "$GITHUB_WORKSPACE" .
          scp -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_rsa /tmp/backend-deploy.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/backend-deploy.tar.gz"

          ssh -T -p "$SSH_PORT" -o ConnectTimeout=15 -o ConnectionAttempts=1 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -e

            REPO_DIR=/opt/ERP-MERN_Backend
            sudo rm -rf "$REPO_DIR"
            sudo mkdir -p "$REPO_DIR"
            sudo tar -xzf /tmp/backend-deploy.tar.gz -C "$REPO_DIR"
            cd "$REPO_DIR"

            if [ -f backend/.env ]; then
              ENV_PATH="$REPO_DIR/backend/.env"
            elif [ -f .env ]; then
              ENV_PATH="$REPO_DIR/.env"
            else
              echo "No .env file found after deployment. Create /opt/ERP-MERN_Backend/.env on EC2 or include backend/.env in the repository workspace."
              exit 1
            fi

            # If repository is a monorepo with a backend/ folder, build from there
            if [ -d backend ]; then
              BUILD_CTX=backend
            else
              BUILD_CTX=.
            fi

            sudo docker build -t erp-backend:latest "$BUILD_CTX"
            sudo docker stop erp-backend || true
            sudo docker rm erp-backend || true
            sudo docker run -d \
              --name erp-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file "$ENV_PATH" \
              erp-backend:latest

            # Simple health check (tries to reach the health endpoint on the host port)
            echo "Waiting for service to start..."
            for i in {1..20}; do
              if curl -sS -f http://localhost:5000/api/health >/dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              sleep 3
            done

            echo "Health check failed - showing last container logs"
            sudo docker logs --tail 100 erp-backend || true
            exit 1
          EOF