name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_USER }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "One or more required GitHub secrets are missing: EC2_HOST, EC2_USER, EC2_SSH_KEY"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%b' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "EC2_SSH_KEY is not a valid unencrypted private key. Make sure you pasted the full private key, not the public key, and that it is not passphrase-protected."
            exit 1
          fi
          SSH_PORT="${{ secrets.EC2_PORT }}"
          if [ -z "$SSH_PORT" ]; then
            SSH_PORT=22
          fi
          echo "$SSH_PORT" > ~/.ssh/ec2_port

      - name: Deploy on EC2
        run: |
          SSH_PORT=$(cat ~/.ssh/ec2_port)
          if ! nc -z -w 5 "${{ secrets.EC2_HOST }}" "$SSH_PORT"; then
            echo "Unable to reach EC2 on port $SSH_PORT. Check the instance public address, security group inbound rules, and whether SSH is listening on a custom port."
            exit 1
          fi

          tar --exclude=.git --exclude=node_modules -czf /tmp/backend-deploy.tar.gz -C "$GITHUB_WORKSPACE" .
          scp -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_rsa /tmp/backend-deploy.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/backend-deploy.tar.gz"

          ssh -T -p "$SSH_PORT" -o ConnectTimeout=15 -o ConnectionAttempts=1 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -e

            REPO_DIR=/opt/ERP-MERN_Backend
            ENV_BACKUP=""
            if [ -f "$REPO_DIR/.env" ]; then
              ENV_BACKUP=/tmp/erp-backend.env
              cp "$REPO_DIR/.env" "$ENV_BACKUP"
            fi

            sudo rm -rf "$REPO_DIR"
            sudo mkdir -p "$REPO_DIR"
            sudo tar -xzf /tmp/backend-deploy.tar.gz -C "$REPO_DIR"
            cd "$REPO_DIR"

            if [ -f "$ENV_BACKUP" ]; then
              mv "$ENV_BACKUP" "$REPO_DIR/.env"
            fi

            if [ -f backend/.env ]; then
              ENV_PATH="$REPO_DIR/backend/.env"
            elif [ -f .env ]; then
              ENV_PATH="$REPO_DIR/.env"
            else
              echo "No .env file found after deployment. Create /opt/ERP-MERN_Backend/.env on EC2 or include backend/.env in the repository workspace."
              exit 1
            fi

            # If repository is a monorepo with a backend/ folder, build from there
            if [ -d backend ]; then
              BUILD_CTX=backend
            else
              BUILD_CTX=.
            fi

            sudo docker build -t erp-backend:latest "$BUILD_CTX"
            sudo docker stop erp-backend || true
            sudo docker rm erp-backend || true
            sudo docker run -d \
              --name erp-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file "$ENV_PATH" \
              erp-backend:latest

            # Simple health check (tries to reach the health endpoint on the host port)
            echo "Waiting for service to start..."
            for i in {1..20}; do
              if curl -sS -f http://localhost:5000/api/health >/dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              sleep 3
            done

            echo "Health check failed - showing last container logs"
            sudo docker logs --tail 100 erp-backend || true
            exit 1
          EOF